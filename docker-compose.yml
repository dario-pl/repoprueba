services:

  db:
    image: mysql:5.7
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    ports:
      - "80:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - wp_data:/var/www/html
      - wp_custom:/var/www/html/wp-content/themes/custom
    depends_on:
      - db
    restart: always

  git-sync:
    image: alpine/git
    volumes:
      - wp_custom:/web
    entrypoint: /bin/sh
    command:
      - -c
      - |
        rm -rf /tmp/repo
        git clone https://github.com/dario-pl/repoprueba.git /tmp/repo
        cp -r /tmp/repo/src/. /web/
    depends_on:
      - wordpress
    restart: "no"

volumes:
  db_data:
  wp_data:
  wp_custom:

